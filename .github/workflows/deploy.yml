name: Deploy Danmu Project

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install and Build Frontend
        run: |
          npm install
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} VITE_ADMIN_API_BASE_URL=${{ secrets.VITE_ADMIN_API_BASE_URL }} npm run build
          # Remove dynamic assets from dist to prevent overwriting backend-managed files
          rm -rf dist/vup-cover dist/vup-bg dist/vup-avatar

      - name: Upload to Tencent Cloud COS
        uses: zkqiang/tencent-cos-action@v0.1.0
        with:
          args: upload -r ./dist/ /
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          bucket: ${{ secrets.COS_BUCKET }}
          region: ${{ secrets.COS_REGION }}

      - name: Purge Tencent Cloud CDN Cache
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          # Check if CDN_PATHS secret exists, otherwise use default domain
          CDN_PATHS: ${{ secrets.CDN_PATHS || 'https://sfqyweb.xyz/' }}
        run: |
          pip install tencentcloud-sdk-python
          python .github/scripts/purge_cdn.py

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync Backend Files to Server (via tmp dir)
        run: |
          # 先传到用户家目录下的临时目录（无需 sudo 权限）
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='server/data' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            server_net/ src/ public/ \
            package.json package-lock.json vite.config.ts tsconfig.json index.html Dockerfile docker-compose.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/danmu-deploy-tmp/

      - name: Deploy Backend and Restart Services
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            TARGET_DIR="/opt/1panel/apps/danmu-tools"
            TMP_DIR="$HOME/danmu-deploy-tmp"

            # 用 sudo 将临时目录内容复制到目标目录
            sudo mkdir -p "$TARGET_DIR"
            sudo cp -r "$TMP_DIR/." "$TARGET_DIR/"

            # 清理临时目录
            rm -rf "$TMP_DIR"

            cd "$TARGET_DIR"

            # Restart Docker Containers
            sudo docker-compose up --build -d
            sudo docker image prune -f
