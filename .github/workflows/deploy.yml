name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'server_net/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Restart Services on Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            TARGET_DIR="/opt/1panel/apps/danmu-tools"
            # 使用国内加速代理
            PROXY_URL="https://gh.jasonzeng.dev/https://github.com/sfqy211/danmu_vue.git"
            
            # 确保目录存在
            if [ ! -d "$TARGET_DIR" ]; then
              sudo mkdir -p "$TARGET_DIR"
              sudo chown -R $(whoami):$(whoami) "$TARGET_DIR"
            fi

            cd "$TARGET_DIR"

            # 初始化或更新 Git 配置
            if [ ! -d ".git" ]; then
              echo "Git repository not initialized. Initializing..."
              git init
              git remote add origin "$PROXY_URL"
            fi
            
            # 强制更新 remote URL 为加速地址
            git remote set-url origin "$PROXY_URL"

            # 拉取最新代码 (使用浅克隆优化速度)
            echo "Fetching latest code from proxy..."
            # 先清除可能存在的代理配置，防止干扰
            git config --unset http.proxy || true
            git fetch --depth 1 origin master
            
            # 强制重置到最新代码
            echo "Resetting to origin/master..."
            git reset --hard origin/master

            # 清理无用的 .github 目录 (因为服务器不需要部署脚本)
            echo "Cleaning up .github directory..."
            rm -rf .github

            # 确保权限
            sudo chown -R $(whoami):$(whoami) .

            # Restart Docker Containers
            sudo docker-compose up --build -d
            sudo docker image prune -f
