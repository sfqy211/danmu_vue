name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'server_net/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Pull Code and Restart Services on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            TARGET_DIR="/opt/1panel/apps/danmu-tools"

            # 确保目录存在
            if [ ! -d "$TARGET_DIR" ]; then
              sudo mkdir -p "$TARGET_DIR"
              sudo chown -R $(whoami):$(whoami) "$TARGET_DIR"
            fi

            cd "$TARGET_DIR"

            # 如果没有 .git 目录，初始化 git
            if [ ! -d ".git" ]; then
              echo "Git repository not initialized. Initializing..."
              git init
              git remote add origin ${{ secrets.REPO_URL }}
            fi

            # 确保 remote URL 正确
            git remote set-url origin ${{ secrets.REPO_URL }} || git remote add origin ${{ secrets.REPO_URL }}

            # 拉取最新代码
            echo "Fetching latest code..."
            git fetch --all
            
            # 强制重置到最新代码
            echo "Resetting to origin/master..."
            git reset --hard origin/master

            # 确保权限
            sudo chown -R $(whoami):$(whoami) .

            # Restart Docker Containers
            sudo docker-compose up --build -d
            sudo docker image prune -f
