name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - 'server_net/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to server (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/opt/1panel/apps/danmu-tools"
          rm: false # Do not delete extra files on server (like .env, data)
          exclude: ".git,.github,.idea,.vscode,__pycache__,node_modules,*.log"

      - name: Restart Services on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            TARGET_DIR="/opt/1panel/apps/danmu-tools"

            # 确保目录存在
            if [ ! -d "$TARGET_DIR" ]; then
              sudo mkdir -p "$TARGET_DIR"
              sudo chown -R $(whoami):$(whoami) "$TARGET_DIR"
            fi

            cd "$TARGET_DIR"

            # Restart Docker Containers
            sudo docker-compose up --build -d
            sudo docker image prune -f
