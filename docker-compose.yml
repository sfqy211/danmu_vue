version: '3'
services:
  danmu-viewer:
    build: .
    container_name: danmu-viewer
    ports:
      - "5200:3001"
    volumes:
      # 映射数据目录
      # 容器内路径为 /app/server/data
      - ./server/data:/app/server/data
    env_file:
      - .env
    environment:
      # .NET Core 监听端口配置 (Dockerfile 中已设置 ASPNETCORE_HTTP_PORTS=3001)
      - ASPNETCORE_ENVIRONMENT=Production
      
      # 应用配置
      - BILI_COOKIE=${BILI_COOKIE}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY}
      - COS_BUCKET=${COS_BUCKET}
      - COS_REGION=${COS_REGION}
      
      # 路径配置 (虽然程序有默认值，显式指定更安全)
      - DANMAKU_DIR=/app/server/data/danmaku
      # DB_PATH 目前在代码中硬编码为 ../server/data/danmaku_data.db，即 /app/server/data/danmaku_data.db
      # - DB_PATH=/app/server/data/danmaku_data.db
      
    restart: unless-stopped
